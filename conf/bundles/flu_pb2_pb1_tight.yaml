# STATUS: experimental -- PB2/PB1 tightened pool. Inherits flu_pb2_pb1
# (regime-blind at neg_to_pos_ratio=1.5, seq_disjoint routing); narrows the
# isolate pool to {Human, Pig} x {H3N2, H1N1} x year >= 2008 via Phase 1
# metadata filters. Analogue of flu_ha_na_tight for the conserved schema pair.
#
# Goal: a more homogeneous slice where (a) the regime taxonomy partially
# collapses (only 2 hosts and 2 subtypes -> many random pairs already match
# on multiple axes), and (b) within-distribution generalization can be
# tested without the Influenza A-wide demographic confounds.
defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  host:        ["Human", "Pig"]
  hn_subtype:  ["H3N2",  "H1N1"]
  year_range:  [2008, 9999]

  neg_to_pos_ratio: 1.5  # overrides the default

  negative_sampling:
    axes: [host, hn_subtype, year]
    year_match: binned
    year_bin_edges:
      - [-1.0e+30, 2015, "<=2015"]
      - [2016, 2020, "2016-2020"]
      - [2021,  1.0e+30, "2021+"]
    regime_targets:
      none_match:           0.05
      host_only:            0.10
      subtype_only:         0.10
      year_only:            0.10
      host_subtype_only:    0.15
      host_year_only:       0.15
      subtype_year_only:    0.15
      host_subtype_year:    0.20
    on_shortfall: redistribute