# STATUS: infeasible -- bipartite collapse at id095 on the full-corpus PB2/PB1 pool.
# Per-function clustering produces just 26 PB2 + 50 PB1 clusters, and the
# bipartite graph has 4 components with the largest at 100% of deduped pairs.
# Stage 3 produces a 100 / 0 / 0 split.
# Kept for reference; not run. See
# results/flu/July_2025/runs/cluster_disjoint_feasibility/feasibility_pb2_pb1_aa.csv.

defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_id_path: data/processed/flu/July_2025/clusters_aa/id095/combined_cluster.parquet
    cluster_id_threshold: 0.95
