# STATUS: experimental -- HA/NA seq_disjoint routing for the
# routing-geometry visualization comparison (BACKLOG.md Methodology #2).
# Inherits flu_ha_na (which already uses seq_disjoint @ hash_key=seq);
# this is an explicit alias so the three viz bundles all share the
# `flu_ha_na_*` naming pattern.
#
# Under seq_disjoint routing, no sequence appears in more than one
# split. This sits between random (full overlap allowed) and
# cluster_disjoint (no sequences within identity threshold appear in
# more than one split) in the leakage-reduction spectrum.
#
# See:
#   docs/plans/2026-05-20_routing_geometry_viz_plan.md

defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: seq_disjoint
    hash_key: seq
