# STATUS: experimental -- HA/NA with seq_disjoint routing on top of metadata-aware
# negative sampling. Inherits flu_ha_na_neg_regimes (regime_targets, k-mer concat,
# slot_norm) and switches dataset.split_strategy.mode from random to seq_disjoint.
#
# Plan: docs/plans/2026-05-10_seq_disjoint_routing_plan.md
# Mitigates: Mode #3 (sequence-level leakage) -- see
# docs/methods/leakage_definitions.md and Exp 4 of
# docs/plans/2026-05-07_leakage_diagnostics_plan.md.
#
# Routing: bipartite (HA-DNA, NA-DNA) connected components, LPT-greedy bin-pack
# into train/val/test. Each unique dna_hash appears in at most one split.
# Coverage and forbidden_pair_keys threading still apply per-split.
defaults:
  - flu_ha_na_neg_regimes
  - _self_

dataset:
  split_strategy:
    mode: seq_disjoint
