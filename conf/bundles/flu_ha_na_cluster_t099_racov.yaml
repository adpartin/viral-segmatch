# STATUS: experimental -- HA/NA cluster_disjoint id99 + regime_aware_coverage=true.
# Inherits flu_ha_na_cluster_t099 (full corpus, ratio=1.5, cluster_disjoint id99).
# Adds a negative_sampling block that (a) enables regime mode with
# host_subtype_year=0.30 budget, and (b) flips regime_aware_coverage on.
#
# Hypothesis: regime-aware coverage will increase the model's hard-regime TNR
# on cluster_id99 splits the same way it did on the tight bundles
# (HA/NA host_subtype_year TNR: 0.646 -> 0.895 on tight). The cluster_id99
# baseline had 2,357 FPs at default threshold (~27% FPR); see
# docs/results/2026-05-14_cluster_disjoint_id99_results.md.

defaults:
  - flu_ha_na_cluster_t099
  - _self_

dataset:
  negative_sampling:
    axes: [host, hn_subtype, year]
    year_match: binned
    year_bin_edges:
      - [-1.0e+30, 2015, "<=2015"]
      - [2016, 2020, "2016-2020"]
      - [2021,  1.0e+30, "2021+"]
    regime_targets:
      none_match:           0.05
      host_only:            0.10
      subtype_only:         0.10
      year_only:            0.10
      host_subtype_only:    0.15
      host_year_only:       0.15
      subtype_year_only:    0.15
      host_subtype_year:    0.20
    on_shortfall: redistribute
    regime_aware_coverage: true
