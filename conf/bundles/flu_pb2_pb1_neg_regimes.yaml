# STATUS: experimental -- PB2/PB1 with metadata-aware (regime) negative sampling.
# Inherits flu_pb2_pb1 (full dataset, k-mer k=6, slot_norm + concat). Adds the
# regime-aware sampler from the v2 builder under dataset.negative_sampling.
#
# Plan: docs/plans/done/2026-05-09_metadata_aware_negatives_plan.md
# Trigger: docs/results/2026-05-07_metadata_shortcut_negatives.md
#
# Key knob: neg_to_pos_ratio. The coverage phase eats roughly |pos_pairs|
# of the budget regime-blind, so leaving ratio=1.0 leaves the regime-aware
# fill phase little room to bias the mix. Setting ratio=2.0 gives the fill
# phase a per-split budget approximately equal to the coverage floor, so
# the configured regime_targets actually shape the mix.
defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  neg_to_pos_ratio: 2.0  # overrides the default

  negative_sampling:
    axes: [host, hn_subtype, year]
    year_match: binned
    year_bin_edges:
      - [-1.0e+30, 2015, "<=2015"]
      - [2016, 2020, "2016-2020"]
      - [2021,  1.0e+30, "2021+"]
    regime_targets:
      none_match:           0.10
      host_only:            0.10
      subtype_only:         0.10
      year_only:            0.10
      host_subtype_only:    0.10
      host_year_only:       0.10
      subtype_year_only:    0.10
      host_subtype_year:    0.30   # the hardest-negative regime (no metadata shortcut)
    on_shortfall: redistribute

# Sklearn-style baselines that should run alongside the MLP. The list under
# `baselines.enabled` is consumed by `src/models/train_pair_baselines.py`
# when --baseline is omitted on the CLI. Per-baseline knobs live at top
# level under `baseline_<name>` (matches the existing pattern that each
# baseline module reads from). See:
#   src/models/baselines/{logistic,lgbm,knn1_margin,knn_vote}.py
#   src/analysis/aggregate_baselines_vs_mlp.py
baselines:
  enabled: [lgbm, knn1_margin, knn_vote]

baseline_knn_vote:
  k: 5
  weights: distance   # 'uniform' or 'distance'
# Other baselines use module defaults (logistic: feature_scaling=standard;
# lgbm: feature_scaling=none; knn1_margin: feature_scaling=none).
