# STATUS: experimental -- PB2/PB1 single-slot (PB2-only) cluster_disjoint at aa idXX = 0.97.
# Inherits flu_pb2_pb1. Overrides split_strategy to constrain only PB2's aa
# clusters; PB1 is unconstrained. Part of the id100..id095 single-slot sweep
# (PB2-only) on Flu A PB2-PB1 -- the falsification sibling to the HA-NA HA-only
# sweep. See:
#   docs/results/2026-05-24_single_slot_HAonly_idXX_sweep.md (HA-NA reference)
#   results/flu/July_2025/runs/cluster_disjoint_feasibility/
#     single_slot_feasibility_pb2_pb1_aa.csv  (id100..id095 all feasible)
#     cluster_pair_coupling_precheck_pb2_pb1_aa.csv  (V=0.76..0.41 vs HA-NA 0.85..0.53)
#   src/datasets/_split_helpers.py::cluster_disjoint_route_pos_df (single_slot mode)

defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_id_path: data/processed/flu/July_2025/clusters_aa/t097/combined_cluster.parquet
    cluster_id_threshold: 0.97
    cluster_alphabet: aa
    single_slot: a       # constrain slot a (PB2) only; slot b (PB1) unconstrained
