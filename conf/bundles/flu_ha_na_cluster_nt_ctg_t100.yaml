# STATUS: experimental -- exp2 (Phase C): "clean contig" -- nt_ctg clusters (t100)
# + nt_ctg features. Inherits flu_ha_na (k-mer nt_ctg k6 default); overrides
# split_strategy to cluster_disjoint on nt_ctg clusters at t100. Isolates the
# CLUSTER axis vs C1 (features held = nt_ctg).
#
# Reported per option (2): "contig-as-submitted, UTR artifact included" -- a
# sensitivity check. Contig DNA carries inconsistent flanking UTR (a submission
# artifact, NOT pre-trimmed), so nt_ctg clustering is confounded by submission
# practice; interpret the result with that caveat (plan section 9/12).
#
# pair_key: PROTEIN (aa) -- the default inference for cluster_alphabet=nt_ctg
# (only nt_cds promotes the pair_key to CDS-DNA). So exp2 dedups positives on the
# protein pair_key, UNLIKE C1/exp1 (nt_cds pair_key). C1<->exp2 therefore differs
# on BOTH the cluster axis AND the pair_key -- noted for cross-experiment compare.
# No cds attach needed: nt_ctg routes on ctg_dna_hash, which is materialized
# per-pair (the same path the B2 consumer smoke validated: 0% cluster leakage).
defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_alphabet: nt_ctg
    cluster_id_path: data/processed/flu/July_2025/clusters_nt_ctg/t100/combined_cluster.parquet
    cluster_id_threshold: 1.0
