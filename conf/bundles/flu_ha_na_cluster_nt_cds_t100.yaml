# STATUS: experimental -- C1 operational baseline (Phase C of the nt_cds/nt_ctg
# refactor plan). nt_cds clusters (CDS-DNA partition at t100) + nt_ctg features
# (contig k-mer k6, inherited from flu_ha_na). The reference baseline that exp1
# (all nt_cds) and exp2 (all nt_ctg) compare against.
#
# pair_key_alphabet: nt_cds -- the post-Phase-2 default for cluster_alphabet=nt_cds
# (inferred, not set). Internally consistent (everything at the CDS level) and
# matches exp1's pair_key, so C1<->exp1 isolates the feature axis (nt_ctg vs
# nt_cds features). This runs ~1-2 pp under the historical mixed-convention id100
# F1 ~= 0.958 (which used the pre-Phase-2 PROTEIN pair_key); the gap is the
# Phase-2 pair_key change, NOT this refactor -- the refactor's result-preservation
# is established by Gate-A. See docs/results/2026-05-15_cluster_disjoint_nt_results.md
# (0.958) and docs/results/2026-06-03_phase2_postmigration_metrics.md (pair_key impact).
#
# Historical lineage: reconstructs the deleted `flu_ha_na_cluster_nt_id100` bundle
# (cluster_alphabet 'nt'->'nt_cds', clusters_nt/id100->clusters_nt_cds/t100, kmer
# 'nt'->'nt_ctg') under the post-refactor naming.
defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_alphabet: nt_cds
    cluster_id_path: data/processed/flu/July_2025/clusters_nt_cds/t100/combined_cluster.parquet
    cluster_id_threshold: 1.0
    # cds source for the cds_dna_hash pair_key + cluster join (new file; the
    # orchestrator's legacy default is the old cds_final.parquet).
    cds_final_path: data/processed/flu/July_2025/cds_dna_final.parquet
