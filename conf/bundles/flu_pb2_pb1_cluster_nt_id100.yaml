# STATUS: experimental -- PB2/PB1 cluster_disjoint routing at nt CDS identity >= 1.00.
# Inherits flu_pb2_pb1 (full unfiltered, k-mer k=6 nt, unit_norm + unit_diff+prod).
# Overrides split_strategy to switch to cluster_disjoint on CDS DNA clusters
# (mmseqs2 linclust --dbtype 2 --min-seq-id 1.00 -c 0.8).
#
# CAVEAT (partial mitigation): The 2026-05-15 aa-vs-nt similarity diagnostic on
# PB2/PB1 reported a ~30 pp aa-tail-excess (PB2: 71.7% aa vs 42.7% nt at
# >=99.5% identity; PB1: 74.3% vs 42.6%), vs ~6 pp on HA/NA. Synonymous
# variation hides aa-near-clones behind distinct DNA contigs, so nt-cluster-
# disjoint splits on PB2/PB1 address only a fraction of the residual aa
# similarity leakage (the part where aa-similar proteins also happen to be
# nt-similar). The remaining ~29 pp of aa-near-clone leakage persists. Treat
# results as a directional comparison vs aa cluster_id99, not a clean
# leakage-blocker.
#
# See:
#   docs/plans/2026-05-08_cosine_and_cluster_splits_plan.md (Experiment B-nt)
#   docs/results/2026-05-15_aa_vs_nt_similarity_leakage_pb2_pb1.md (the diagnostic)

defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_alphabet: nt
    cluster_id_path: data/processed/flu/July_2025/clusters_nt/id100/combined_cluster.parquet
    cluster_id_threshold: 1.00
