# STATUS: experimental -- HA/NA HA-only cluster_disjoint at aa idXX = 0.094 (holdout).
# Extends the id100..id095 sweep down to lower thresholds. Goal: identify where
# 1-NN drops vs MLP/LGBM, and at what idXX MLP still beats memorization.
# Per the D3 check in src/datasets/_split_helpers.py, holdout is expected to
# pass at all these thresholds (long tail of small atoms fills val/test cleanly).

defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_id_path: data/processed/flu/July_2025/clusters_aa/id094/combined_cluster.parquet
    cluster_id_threshold: 0.094
    cluster_alphabet: aa
    single_slot: a
