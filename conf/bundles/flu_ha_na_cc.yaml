# STATUS: experimental -- HA/NA 2D-CD cross-validation (bilateral cluster-disjoint
# connected-component K-fold + within-CC negatives). Built by the maintained 2D-CD
# builder (src/datasets/dataset_pairs_cc.py), NOT the v2 Stage-3 CLI (which rejects
# mode=cluster_disjoint_cc).
#
# Inherits flu_ha_na_cluster_t099 (aa cluster_disjoint at t099: cluster_id_path +
# threshold). Switches the mode to cluster_disjoint_cc and sets the CC-builder knobs:
# 5-fold CV, one positive per CC (m_pos_per_cc=1 -> uniform atoms), 1:1 within-CC
# random negatives, drop singleton CCs.
#
# Run:
#   python src/datasets/dataset_pairs_cc.py --config_bundle flu_ha_na_cc \
#       --out_dir data/datasets/flu/July_2025/runs/dataset_flu_ha_na_cc_<ts>
#
# See docs/plans/2026-06-09_cc_dataset_cv_plan.md.

defaults:
  - flu_ha_na_cluster_t099
  - _self_

dataset:
  n_folds: 5              # K (cross-validation)
  neg_to_pos_ratio: 1.0   # 1:1 within-CC negatives (overrides flu_ha_na's 1.5)
  val_ratio: 0.1

  split_strategy:
    mode: cluster_disjoint_cc   # 2D-CD builder mode (rejected by _validate_v2_config)
    # cluster_id_path + cluster_id_threshold inherited from flu_ha_na_cluster_t099 (aa t099)
    cluster_alphabet: aa
    m_pos_per_cc: 1             # one positive per CC -> uniform atoms, cleanest K-fold
    drop_singleton_ccs: true    # drop CCs with no within-CC negative (singletons)
