# STATUS: experimental -- demo of the dataset.molecule master knob (plan §13).
# One knob (molecule: nt_cds) derives all three alphabet axes at config-load:
#   cluster_alphabet = nt_cds  (inherited from the C1 routing bundle; matches)
#   pair_key_alphabet = nt_cds (derived from molecule; absent in the chain)
#   kmer.alphabet = nt_cds     (authoritative; overrides the inherited nt_ctg)
# Equivalent to the explicit all-nt_cds config (exp1) but authored via the single
# knob, with the config-load guard enforcing the three agree.
defaults:
  - flu_ha_na_cluster_nt_cds_t100
  - _self_

dataset:
  molecule: nt_cds
