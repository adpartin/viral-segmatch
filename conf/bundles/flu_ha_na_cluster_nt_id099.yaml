# STATUS: experimental -- HA/NA cluster_disjoint routing at nt CDS identity >= 0.99.
# Inherits flu_ha_na_cluster_nt_id100; lowers the nt clustering threshold to 0.99.
#
# Feasibility (results/flu/July_2025/runs/cluster_disjoint_feasibility/feasibility_ha_na_nt.csv):
# n_components=5,710, largest_pct=69.3, second_pct=6.0. Marginal — largest
# component fits inside the 80% train target but skews the routing. id095
# and below collapse to a single mega-component (largest ≥98% of pairs)
# and are NOT feasible on the full Flu A corpus.

defaults:
  - flu_ha_na_cluster_nt_id100
  - _self_

dataset:
  split_strategy:
    cluster_id_path: data/processed/flu/July_2025/clusters_nt/id099/combined_cluster.parquet
    cluster_id_threshold: 0.99
