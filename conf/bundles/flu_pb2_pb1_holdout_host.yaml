# STATUS: experimental -- PB2/PB1 with metadata_holdout on host axis (train=Human,
# test=Pig). Inherits flu_pb2_pb1 (regime-blind sampling at neg_to_pos_ratio=1.5);
# changes the split mechanism from random to a cross-host holdout.
#
# Plan: docs/plans/2026-05-11_metadata_holdout_plan.md
# Analogue of flu_ha_na_holdout_host for the conserved-pair schema.
defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  # metadata_holdout is mutually exclusive with seq_disjoint routing.
  # The base bundle uses seq_disjoint; override back to random here so the
  # cross-host holdout drives the split mechanism instead.
  split_strategy:
    mode: random
  metadata_holdout:
    train:
      host: ["Human"]
    test:
      host: ["Pig"]
    val: null   # carve val_ratio (0.1 by default) off the train pool
