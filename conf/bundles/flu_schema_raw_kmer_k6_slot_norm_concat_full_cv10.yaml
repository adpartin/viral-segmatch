# STATUS: active -- paper experiment (10-fold CV, k-mer k=6, slot_norm + concat, HA/NA, ALL isolates)
# Full-dataset version of flu_schema_raw_kmer_k6_slot_norm_concat_cv10.
# Overrides max_isolates_to_process to null (use all isolates).
# Related to roadmap Task 2: large dataset.
#
# Note: This bundle must stay flat in conf/bundles/ (not in a subdirectory).

defaults:
  - flu_schema_raw_kmer_k6_slot_norm_concat_cv10
  - _self_

dataset:
  max_isolates_to_process: null

# Runtime analysis: force exactly 100 epochs (no early stopping)
training:
  epochs: 100
  patience: 100
