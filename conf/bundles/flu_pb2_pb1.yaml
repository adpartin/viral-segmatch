# STATUS: active -- HA/NA balanced-big3 full-dataset sweep.
# Inherits Task 11 master (full dataset, 12-fold CV, k-mer k=6 slot_norm +
# concat, 100 epochs). Adds baked-in subtype balancing on {H1N1, H3N2, H5N1}
# so `run_cv_lambda.py --config_bundle flu_ha_na` runs the balanced sweep
# with no CLI overrides.
#
# Alternative invocation without baking into a bundle (equivalent run):
#   python scripts/run_cv_lambda.py --config_bundle flu_ha_na \
#       --override dataset.subtype_selection.mode=balanced \
#                  'dataset.subtype_selection.included_subtypes=[H1N1,H3N2,H5N1]'

defaults:
  - flu_28_major_protein_pairs_master
  - _self_

dataset:
  pair_builder_version: v2 # v1 | v2 (default)
  schema_pair:
    - "RNA-dependent RNA polymerase PB2 subunit"  # PB2 (S1)
    - "RNA-dependent RNA polymerase catalytic core PB1 subunit"  # PB1 (S2)
  subtype_selection:
    # mode: balanced
    # included_subtypes: ["H1N1", "H3N2", "H5N1"]
    # target_count_per_subtype defaults to 'min' (downsample to smallest
    # available count, which on the full July 2025 dataset will be H5N1).
    # seed defaults to RANDOM_SEED (derived from master_seed=42).
  # max_isolates_to_process inherits null from master (full ~111K dataset).
  # Must not be set here: mode=balanced + max_isolates_to_process errors out
  # by design (see docs/plans/done/subtype_balancing_plan.md, error matrix).
  n_folds: null   # single train/val/test split (override flu_28_major_protein_pairs_master's inherited CV=12)

  neg_to_pos_ratio: 2.0  # overrides the default

  # # No metadata filters
  # host: null # control for host
  # year: null # control for year
  # hn_subtype: null # control for subtype
  # geo_location: null
  # passage: null

  split_strategy:
    mode: seq_disjoint # 'random' | 'seq_disjoint' (default)
    hash_key: seq # 'seq' (protein, default) | 'dna' (nucleotide)

training:
  epochs: 100
  # epochs: 10
  patience: 10
  feature_source: kmer  # kmer | esm2
  # hidden_dims: [100] # bottleneck layer; default: [512, 256, 64]
  # hidden_dims: [] # simulate logistic regression; default: [512, 256, 64]
  # dropout: 0.0 # no dropout

  # # Test 1: [|u  − v|, u * v]
  # slot_transform: "none"
  # interaction: "diff + prod"

  # # Test 2: [|u_n − v_n|, u_n * v_n], where u_n and v_n are L2-normalized (unit norm) versions of the original k-mer count vectors u and v
  # # This test is the primary representation for interpretability.
  # slot_transform: "unit_norm"
  # interaction: "diff + prod"

  # Test 3: [|u_n − v_n|/‖·‖, u_n * v_n]
  slot_transform: "unit_norm"
  interaction: "unit_diff + prod"

  # # Test 4: [|u_n − v_n|/‖·‖, (u_n * v_n)/‖·‖]
  # # Here the magnitude fully stripped
  # slot_transform: "unit_norm"
  # interaction: "unit_diff + unit_prod"

# Sklearn-style baselines that should run alongside the MLP. The list under
# `baselines.enabled` is consumed by `src/models/train_pair_baselines.py`
# when --baseline is omitted on the CLI. Per-baseline knobs live at top
# level under `baseline_<name>` (matches the existing pattern that each
# baseline module reads from). See:
#   src/models/baselines/{logistic,lgbm,knn1_margin,knn_vote}.py
#   src/analysis/aggregate_baselines_vs_mlp.py
baselines:
  # enabled: [logistic, lgbm, knn1_margin, knn_vote]
  enabled: [lgbm, knn1_margin]
