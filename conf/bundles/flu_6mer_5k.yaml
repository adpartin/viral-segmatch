# STATUS: experimental -- full dataset, k-mer k=6, speed-up benchmarking
# Inherits from flu.yaml (Gen1 base). Full dataset with k-mer features.
# Used as baseline for speed_up.md optimization experiments.
#
# Note: This bundle must stay flat in conf/bundles/ (not in a subdirectory).

defaults:
  - flu
  - _self_

dataset:
  max_isolates_to_process: 5000  # Use all isolates

training:
  feature_source: kmer
  epochs: 20
  patience: 20
  ## Speed-up method 1
  eval_train_metrics: true  # Default
  infer_batch_size: null    # Default
  # eval_train_metrics: false   # Enable for baseline comparison; child bundles may disable
  # infer_batch_size: 1024      # Larger batch for inference (no gradient memory needed)
  ## Speed-up method 3
  # num_workers: 2              # Async data loading (2 workers to avoid CPU contention) - didn't help
  # pin_memory: true            # Page-locked memory for faster CPU->GPU transfer
  num_workers: 0              # Async data loading (2 workers to avoid CPU contention)
  pin_memory: false            # Page-locked memory for faster CPU->GPU transfer
  ## Speed-up method 4
  use_amp: false               # Mixed precision (float16 forward pass on GPU Tensor Cores)
  # use_amp: true               # Mixed precision (float16 forward pass on GPU Tensor Cores)
  ## Speed-up via batch_size
  batch_size: 128

