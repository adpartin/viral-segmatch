# STATUS: experimental (marginal) -- PB2/PB1 cluster_disjoint routing at aa identity >= 0.99.
# Inherits flu_pb2_pb1. Per-function clustering produces ~8K-11K clusters each
# at id099, BUT the bipartite graph has one dominant component covering 87% of
# deduped pairs (because PB2/PB1 polymerase subunits are conserved across most
# isolates within each subtype). Stage 3 will produce roughly
# 87 / 6.5 / 6.5 — train-heavy but val/test still ~3,500 pairs each, enough
# to evaluate. The result mainly tests "what happens when most variation gets
# folded into train"; expect AUC to drop notably vs seq_disjoint baseline.
#
# See:
#   docs/plans/2026-05-08_cosine_and_cluster_splits_plan.md (Experiment B)
#   docs/results/2026-05-14_protein_redundancy_per_function.md (feasibility table)

defaults:
  - flu_pb2_pb1
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_id_path: data/processed/flu/July_2025/clusters/id099/combined_cluster.parquet
    cluster_id_threshold: 0.99
