# STATUS: experimental -- HA/NA cluster_disjoint routing at nt CDS identity >= 1.00.
# Inherits flu_ha_na (full unfiltered, k-mer k=6 nt, unit_norm + unit_diff+prod).
# Overrides split_strategy to switch to cluster_disjoint on CDS DNA clusters
# (mmseqs2 linclust --dbtype 2 --min-seq-id 1.00 -c 0.8).
#
# Experiment B-nt — the nt-level companion to the aa Experiment B
# (`flu_ha_na_cluster_id99` and friends). DNA is more variable than aa
# (synonymous codons), so the cluster identity threshold required to split
# the bipartite mega-component is generally LOWER for nt than aa. id100
# is the strict-identity nt baseline; if the feasibility check rules it
# out, the lower-threshold siblings (`*_id095`, `*_id090`) are the
# operational bundles.
#
# See:
#   docs/plans/2026-05-08_cosine_and_cluster_splits_plan.md (Experiment B-nt)
#   docs/results/2026-05-13_aa_vs_nt_similarity_leakage.md  (aa vs nt residual leakage on HA/NA)
#
# Prerequisites:
#   1. data/processed/flu/July_2025/cds_final.parquet (Stage 1.5)
#      python src/preprocess/extract_cds_dna.py --config_bundle flu_ha_na
#   2. data/processed/flu/July_2025/clusters_nt/id100/combined_cluster.parquet (Step 6)
#      python -m src.analysis.seq_redundancy_per_function \
#          --cds_final data/processed/flu/July_2025/cds_final.parquet \
#          --out_root  data/processed/flu/July_2025/clusters_nt \
#          --thresholds 1.00 0.99 0.95 0.90 0.85 0.80 \
#          --functions HA NA PB2 PB1 --algorithm linclust --threads 8

defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_alphabet: nt
    cluster_id_path: data/processed/flu/July_2025/clusters_nt/id100/combined_cluster.parquet
    cluster_id_threshold: 1.00
