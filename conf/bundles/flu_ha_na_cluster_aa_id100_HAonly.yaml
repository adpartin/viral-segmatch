# STATUS: experimental -- HA/NA single-slot (HA-only) cluster_disjoint at aa idXX = 0.100.
# Inherits flu_ha_na. Overrides split_strategy to constrain only HA's aa clusters;
# NA is unconstrained. Part of the id100..id095 single-slot sweep (HA-only) on
# Flu A HA-NA -- see docs/results/2026-05-24_cluster_disjoint_feasibility_HA_NA.md
# for feasibility pre-flight and src/datasets/_split_helpers.py for the routing.

defaults:
  - flu_ha_na
  - _self_

dataset:
  split_strategy:
    mode: cluster_disjoint
    cluster_id_path: data/processed/flu/July_2025/clusters_aa/id100/combined_cluster.parquet
    cluster_id_threshold: 1.00
    cluster_alphabet: aa
    single_slot: a       # constrain slot a (HA) only; slot b (NA) unconstrained
