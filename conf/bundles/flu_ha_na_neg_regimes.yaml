# STATUS: experimental -- HA/NA with metadata-aware (regime) negative sampling.
# Inherits flu_ha_na (full dataset, k-mer k=6, slot_norm + concat). Adds the
# regime-aware sampler from the v2 builder under dataset.negative_sampling.
#
# Plan: docs/plans/done/2026-05-09_metadata_aware_negatives_plan.md
# Trigger: docs/results/2026-05-07_metadata_shortcut_negatives.md
#
# Key knob: neg_to_pos_ratio. The coverage phase eats roughly |pos_pairs|
# of the budget regime-blind, so leaving ratio=1.0 leaves the regime-aware
# fill phase little room to bias the mix. Setting ratio=2.0 gives the fill
# phase a per-split budget approximately equal to the coverage floor, so
# the configured regime_targets actually shape the mix.
defaults:
  - flu_ha_na
  - _self_

dataset:
  neg_to_pos_ratio: 2.0  # overrides the default

  negative_sampling:
    axes: [host, hn_subtype, year]
    year_match: binned
    year_bin_edges:
      - [-1.0e+30, 2015, "<=2015"]
      - [2016, 2020, "2016-2020"]
      - [2021,  1.0e+30, "2021+"]
    regime_targets:
      none_match:           0.10
      host_only:            0.10
      subtype_only:         0.10
      year_only:            0.10
      host_subtype_only:    0.10
      host_year_only:       0.10
      subtype_year_only:    0.10
      host_subtype_year:    0.30   # the hardest-negative regime (no metadata shortcut)
    on_shortfall: redistribute
