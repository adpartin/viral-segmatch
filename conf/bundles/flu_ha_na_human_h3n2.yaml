# STATUS: active -- HA/NA, Human + H3N2 metadata filter.
# Inherits Task 11 master (k-mer k=6, slot_norm + concat, 100 epochs).
# Applies isolate-level metadata filters: host=Human, hn_subtype=H3N2.
# Single train/val/test split (n_folds=null overrides master's CV=12).

defaults:
  - flu_28_major_protein_pairs_master
  - _self_

training:
  epochs: 100
  patience: 10
  feature_source: kmer  # kmer | esm2
  hidden_dims: [100] # bottleneck layer; default: [512, 256, 64]
  # dropout: 0.0 # no dropout

dataset:
  pair_builder_version: v2 # v1 | v2
  schema_pair:
    - "Hemagglutinin precursor"
    - "Neuraminidase protein"
  subtype_selection:
    # mode: balanced
    # included_subtypes: ["H1N1", "H3N2", "H5N1"]
    # target_count_per_subtype defaults to 'min' (downsample to smallest
    # available count, which on the full July 2025 dataset will be H5N1).
    # seed defaults to RANDOM_SEED (derived from master_seed=42).
  # max_isolates_to_process inherits null from master (full ~111K dataset).
  # Must not be set here: mode=balanced + max_isolates_to_process errors out
  # by design (see docs/plans/done/subtype_balancing_plan.md, error matrix).
  n_folds: null   # single train/val/test split (override flu_28_major_protein_pairs_master's inherited CV=12)

  # Metadata filters
  host: "Human"
  year: null
  hn_subtype: "H3N2"
  geo_location: null
  passage: null
