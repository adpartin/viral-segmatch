# Split strategy: seq_disjoint
# Keeps each unique sequence in one split only, keyed on EXACT-identity hashes
# (vs cluster_disjoint, which groups by similarity). Mitigates sequence-level leakage.

mode: seq_disjoint
hash_key: seq   # seq_disjoint-only: 'seq' = protein hash (stricter) | 'dna' = contig DNA hash (looser)
