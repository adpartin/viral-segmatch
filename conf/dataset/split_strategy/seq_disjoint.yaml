# Split strategy: seq_disjoint (default). Routes positive pairs by bipartite
# (side-A, side-B) connected components on the chosen hash family, so each unique
# sequence appears in at most one split. Mitigates sequence-level leakage.

mode: seq_disjoint
hash_key: seq   # seq_disjoint-only: 'seq' = protein hash (stricter) | 'dna' = contig DNA hash (looser)
