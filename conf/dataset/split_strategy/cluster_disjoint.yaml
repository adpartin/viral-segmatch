# Split strategy: cluster_disjoint. Routes positive pairs by bipartite-CC on
# mmseqs2 cluster ids (not identity hashes). Mitigates cluster leakage
# (near-clone neighbors below the identity threshold).
mode: cluster_disjoint
cluster_alphabet: aa        # 'aa' | 'nt_cds' | 'nt_ctg'
cluster_id_path: null       # REQUIRED per bundle: mmseqs (<hash>, cluster_id) parquet
cluster_id_threshold: null  # documentation-only; recorded in the cluster_disjoint audit
cds_final_path: null        # nt_cds only; defaults to cds_dna_final.parquet beside protein_final
single_slot: null           # null (bilateral) | 'a' | 'b' (constrain one slot only)
feasibility:                # per-fold drift/size guard (k-fold + holdout)
  max_acceptable_drift_pp: 0.05  # max abs pp deviation per bin from target
  min_test_frac: 0.05            # test bin must be >= this fraction of pairs
