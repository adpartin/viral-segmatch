# Base training configuration (reusable)
batch_size: 16
learning_rate: 0.001 # 1e-3
epochs: 120
# optimizer: 'adam'  # Options: 'adam', 'adamw', 'sgd'
optimizer: 'adamw'  # Options: 'adam', 'adamw', 'sgd'
weight_decay: 0.01  # L2 regularization (0.01 recommended for AdamW, 0.0001 for Adam)
momentum: 0.9  # For SGD only
use_lr_scheduler: true  # Enable learning rate scheduling
lr_scheduler: 'reduce_on_plateau'  # Options: 'reduce_on_plateau', 'cosine', 'step'
lr_scheduler_patience: 10  # For reduce_on_plateau: epochs to wait before reducing LR
lr_scheduler_factor: 0.5  # Factor to reduce LR by (for reduce_on_plateau)
lr_scheduler_min_lr: 1e-6  # Minimum learning rate

# Model architecture
hidden_dims: [512, 256, 64]
dropout: 0.2

# Slot transform options (per-slot embedding transform applied before interaction)
slot_transform: none  # none | shared | slot_specific | shared_adapter | slot_norm
slot_transform_dims: null  # e.g., [1280, 512, 256] projection dimensions
adapter_dims: null  # e.g., [128] this is the dimension of the adapter output

# Feature source: which precomputed features to use
feature_source: esm2  # esm2 | kmer

# Feature scaling (applied before features enter the model).
# - 'none' (default): pass raw features straight through.
# - 'standard': StandardScaler (per-feature mean 0, unit variance) FIT ON THE
#    TRAIN SPLIT ONLY; the same fitted scaler transforms val/test. Saved to
#    feature_scaler.joblib for inference reuse.
# Currently implemented for feature_source=kmer only. ESM-2 path raises
# NotImplementedError when scaling is requested (TODO: per-dataset scaler hook).
# Note: feature_scaling is independent from slot_transform (LayerNorm). They
# are complementary — population-level (scaler, fixed) vs sample-level
# (slot_norm, dynamic) — and can be combined.
feature_scaling: none  # none | standard

# Interaction spec: which features to compute from (emb_a, emb_b)
interaction: concat  # concat | diff | prod | unit_diff | concat+unit_diff | etc.

# Training control
patience: 15  # Early stopping patience
early_stopping_metric: 'f1'  # Metric for early stopping: 'loss' (lower is better), 'f1' and 'auc' (higher is better)
threshold_metric: null  # Threshold optimization metric; null (no optimization; use 0.5), 'f1' (default), 'f0.5' (emphasize precision), 'f2' (emphasize recall); This metric is used to determine the threshold for the binary classifier; the threshold is the metric value that is used to classify the pairs as positive or negative

# Performance
eval_train_metrics: false  # Run a full forward pass over training data each epoch to compute
                           # train F1/AUC/precision/recall/Brier. Doubles epoch time. Enable
                           # when debugging model behavior; disable for production/HPC runs.
                           # train_loss is always tracked regardless of this setting.
infer_batch_size: null     # Batch size for inference passes (train eval, val eval, test eval).
                           # null = use training batch_size. Can be larger than training batch_size
                           # because inference (torch.no_grad) uses no gradient memory.
num_workers: 0             # IGNORED — hard-coded to 0 in train_pair_classifier.py.
                           # See the comment there for why: IPC overhead (87% slower) +
                           # torch.from_numpy() safety with forked workers.
pin_memory: false          # Pin CPU tensors in page-locked memory for faster CPU->GPU transfer.
                           # Almost always beneficial on GPU. Only costs extra pinned RAM (not an
                           # issue on systems with >=64GB). No effect on CPU-only training.
use_amp: false             # Automatic Mixed Precision. Runs forward pass in float16 on GPU
                           # (Tensor Cores) while keeping loss and optimizer in float32.
                           # ~1.3-1.5x on V100, ~2x on A100. Negligible accuracy impact for MLPs.
                           # No effect on CPU-only training.

# Diagnostics
eval_swapped_test: false  # If true, also evaluate the trained model on swapped test inputs (B,A) and write test_predicted_swapped.csv
