# Flu virus configuration
virus_name: 'flu'
data_version: 'July_2025'

# The protein annotations from Jim are defined here:
# https://github.com/jimdavis1/Viral_Annotation/blob/main/Viral_PSSM.json

# Core protein functions (present in nearly all Flu A genomes)
# Core proteins: 9 (PB2, PB1, PA, HA, NP, NA, M1, M2, NEP)
core_functions:
  - 'RNA-dependent RNA polymerase PB2 subunit'  # Seg. 1 (PB2)
  - 'RNA-dependent RNA polymerase catalytic core PB1 subunit'  # Seg. 2 (PB1)
  - 'RNA-dependent RNA polymerase PA subunit'  # Seg. 3 (PA)
  - 'Hemagglutinin precursor'  # Seg. 4 (HA0)
  - 'Nucleocapsid protein'  # Seg. 5 (NP)
  - 'Neuraminidase protein'  # Seg. 6 (NA)
  - 'Matrix protein 1'  # Seg. 7 (M1)
  - 'M2 ion channel'  # Seg. 7 (Matrix protein 2; M2) - EXCLUDE from modeling!
  - 'Nuclear export protein'  # Seg. 8 (NEP, formerly NS2) - EXCLUDE from modeling!

# Auxiliary protein functions (additional proteins, not always present)
# Auxiliary proteins: 10 (PB2-S1, PB1-F2, PB1-N40, PA-X, PA-N155, PA-N182, HA1, HA2, M42, NEP)
aux_functions:
  - 'Splice variant of PB2, RIG-I-dependent interferon signaling pathway inhibitor'  # Seg. 1 (PB2-S1)
  - 'Virulence factor PB1-F2'  # Seg. 2 (PB1-F2)
  - 'PB1-N40 protein' # Seg. 2 (PB1-N40)
  - 'PA-N155 protein' # Seg. 3 (PA-N155)
  - 'PA-N182 protein' # Seg. 3 (PA-N182)
  - 'Host mRNA degrading protein PA-X'  # Seg. 3 (PA-X)
  - 'Mature hemagglutinin N-terminal receptor binding subunit'  # Seg. 4 (HA1)
  - 'Mature hemagglutinin C-terminal membrane fusion subunit'  # Seg. 4 (HA2)
  - 'M42 alternative ion channel'  # Seg. 7 (M42)
  - 'Hypothetical host adaptation protein NS3'  # Seg. 8 (NS3)
  - 'Non-structural protein 1, interferon antagonist and host mRNA processing inhibitor'  # Seg. 8 (NS1) - INCLUDE in modeling!

# Selected protein functions (subset used for downstream ML modeling)
# These are the "major" proteins: the primary gene product per segment (one per
# segment). In BV-BRC, major proteins are the only features that receive a
# feature_quality annotation. Alternative reading frame products (M2, NEP,
# PB1-F2, PA-X, etc.) and mature peptides (HA1, HA2) are not major proteins.
# Flu A: 7 core major proteins + 1 auxiliary major protein (NS1) = 8 total.
selected_functions:
  # Core major proteins (7 out of 9 core — excludes M2 and NEP which are
  # alternative reading frame products sharing segments 7 and 8)
  - 'RNA-dependent RNA polymerase PB2 subunit'  # Seg. 1 (PB2)
  - 'RNA-dependent RNA polymerase catalytic core PB1 subunit'  # Seg. 2 (PB1)
  - 'RNA-dependent RNA polymerase PA subunit'  # Seg. 3 (PA)
  - 'Hemagglutinin precursor'  # Seg. 4 (HA0)
  - 'Nucleocapsid protein'  # Seg. 5 (NP)
  - 'Neuraminidase protein'  # Seg. 6 (NA)
  - 'Matrix protein 1'  # Seg. 7 (M1)
  # Auxiliary major protein (1 out of 11 aux — NS1 is the primary product of Seg. 8)
  - 'Non-structural protein 1, interferon antagonist and host mRNA processing inhibitor'  # Seg. 8 (NS1)

# selected_functions:
#   - 'RNA-dependent RNA polymerase PB2 subunit'  # Seg. 1 (PB2)
#   - 'RNA-dependent RNA polymerase catalytic core PB1 subunit'  # Seg. 2 (PB1)

# DEPRECATED: Simple segment mapping (function → canonical_segment).
# This flat mapping cannot represent M1/M2 and NEP cases where the same
# segment hosts multiple proteins.  All active preprocessing uses
# conditional_segment_mappings (below) instead.  Retained for backward
# compatibility with get_core/aux_function_segment_mapping() in
# config_hydra.py — do not use in new code.
segment_mapping:
  # Core proteins
  'RNA-dependent RNA polymerase PB2 subunit': 'S1'
  'RNA-dependent RNA polymerase catalytic core PB1 subunit': 'S2'
  'RNA-dependent RNA polymerase PA subunit': 'S3'
  'Hemagglutinin precursor': 'S4'
  'Nucleocapsid protein': 'S5'
  'Neuraminidase protein': 'S6'
  'Matrix protein 1': 'S7'
  'M2 ion channel': 'S7'  # Maxtrix Protein 2 - EXCLUDE from modeling!
  'Nuclear export protein': 'S8'  # NEP, formerly NS2 - EXCLUDE from modeling!
  # Auxiliary proteins
  'Splice variant of PB2, RIG-I-dependent interferon signaling pathway inhibitor': 'S1'
  'Virulence factor PB1-F2': 'S2'  # Polymerase Basic 1-Frame 2 (https://en.wikipedia.org/wiki/Influenza_A_virus)
  'PB1-N40 protein': 'S2'  # "PB1 mRNA encode three proteins by leaky scanning: PB1, N40 and PB1-F2" (https://viralzone.expasy.org/6)
  'PA-N155 protein': 'S3'  # "Leaky scanning may produces N-truncated PA proteins, namely PA-N155 and PA-N182" (https://viralzone.expasy.org/6)
  'PA-N182 protein': 'S3'  # "Leaky scanning may produces N-truncated PA proteins, namely PA-N155 and PA-N182" (https://viralzone.expasy.org/6)
  'Host mRNA degrading protein PA-X': 'S3'  # https://en.wikipedia.org/wiki/Influenza_A_virus
  'Mature hemagglutinin N-terminal receptor binding subunit': 'S4'
  'Mature hemagglutinin C-terminal membrane fusion subunit': 'S4'
  'M42 alternative ion channel': 'S7'  # "Some strains can express M42 from the M segment"
  'Hypothetical host adaptation protein NS3': 'S8'  # https://www.tandfonline.com/doi/full/10.1038/emi.2012.38
  'Non-structural protein 1, interferon antagonist and host mRNA processing inhibitor': 'S8' # NS1 - INCLUDE in modeling!

# Conditional segment mappings (function + replicon_type → canonical_segment)
# Used by assign_protein_segments() in the protein preprocessing pipeline.
#
# Why conditional? Each entry encodes a known biological fact: e.g., PB2 should
# be on Segment 1. A canonical segment is only assigned when BOTH the protein
# function AND the replicon_type in the GTO match what we expect from known
# biology. If a record says PB2 is on Segment 3, that's inconsistent and the
# protein is left unassigned rather than mislabeled.
#
# Split into core_proteins (present in nearly all genomes) and aux_proteins
# (alternative reading frame products, mature peptides, etc.). Core proteins are
# mapped first; aux proteins fill in any remaining unassigned rows.
conditional_segment_mappings:
  core_proteins:
    - function: 'RNA-dependent RNA polymerase PB2 subunit'
      replicon_type: 'Segment 1'
      core_segment: 'S1'
    - function: 'RNA-dependent RNA polymerase catalytic core PB1 subunit'
      replicon_type: 'Segment 2'
      core_segment: 'S2'
    - function: 'RNA-dependent RNA polymerase PA subunit'
      replicon_type: 'Segment 3'
      core_segment: 'S3'
    - function: 'Hemagglutinin precursor'
      replicon_type: 'Segment 4'
      core_segment: 'S4'
    - function: 'Nucleocapsid protein'
      replicon_type: 'Segment 5'
      core_segment: 'S5'
    - function: 'Neuraminidase protein'
      replicon_type: 'Segment 6'
      core_segment: 'S6'
    - function: 'Matrix protein 1'
      replicon_type: 'Segment 7'
      core_segment: 'S7'
    - function: 'M2 ion channel'
      replicon_type: 'Segment 7'
      core_segment: 'S7'
    - function: 'Nuclear export protein'
      replicon_type: 'Segment 8'
      core_segment: 'S8'
  aux_proteins:
    - function: 'Splice variant of PB2, RIG-I-dependent interferon signaling pathway inhibitor'
      replicon_type: 'Segment 1'
      aux_segment: 'S1'
    - function: 'Virulence factor PB1-F2'
      replicon_type: 'Segment 2'
      aux_segment: 'S2'
    - function: 'PB1-N40 protein'
      replicon_type: 'Segment 2'
      aux_segment: 'S2'
    - function: 'PA-N155 protein'
      replicon_type: 'Segment 3'
      aux_segment: 'S3'
    - function: 'PA-N182 protein'
      replicon_type: 'Segment 3'
      aux_segment: 'S3'
    - function: 'Host mRNA degrading protein PA-X'
      replicon_type: 'Segment 3'
      aux_segment: 'S3'
    - function: 'Mature hemagglutinin N-terminal receptor binding subunit'
      replicon_type: 'Segment 4'
      aux_segment: 'S4'
    - function: 'Mature hemagglutinin C-terminal membrane fusion subunit'
      replicon_type: 'Segment 4'
      aux_segment: 'S4'
    - function: 'M42 alternative ion channel'
      replicon_type: 'Segment 7'
      aux_segment: 'S7'
    - function: 'Hypothetical host adaptation protein NS3'
      replicon_type: 'Segment 8'
      aux_segment: 'S8'
    - function: 'Non-structural protein 1, interferon antagonist and host mRNA processing inhibitor'
      replicon_type: 'Segment 8'
      aux_segment: 'S8'

# Replicon-to-segment mapping (for genome pipeline — direct replicon_type → canonical_segment)
# Used by assign_genome_segments(). Genomes have one contig per segment, so a
# simple "replicon_type" → "segment" map suffices (no function-based disambiguation
# needed, unlike the protein pipeline which uses conditional_segment_mappings).
replicon_to_segment:
  'Segment 1': 'S1'
  'Segment 2': 'S2'
  'Segment 3': 'S3'
  'Segment 4': 'S4'
  'Segment 5': 'S5'
  'Segment 6': 'S6'
  'Segment 7': 'S7'
  'Segment 8': 'S8'

# Replicon types (segment identifiers used in GTO files)
replicon_types:
  - 'Segment 1'
  - 'Segment 2'
  - 'Segment 3'
  - 'Segment 4'
  - 'Segment 5'
  - 'Segment 6'
  - 'Segment 7'
  - 'Segment 8'
